<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apagar Conta</title>
    <link rel="stylesheet" href="../styles/updateAccount.style.css">
</head>

<body>
    <div id="container">
        <h3>Apagar Paciente</h3>
        <form method=POST action="/deletePaciente">
            <div>
                <label>Número SUS:</label>
                <input name="cod_sus" placeholder="Digite o Número do SUS" type="number" required>
            </div>
            <div>
                <label>Nome do Paciente:</label>
                <input name="nome" placeholder="Digite o nome do Paciente" type="text" required>
            </div>
            <button type="submit"><span>Apagar Paciente</span></button>
        </form>
    </div>
</body>

</html>
