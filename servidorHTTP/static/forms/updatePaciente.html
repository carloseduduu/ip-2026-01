<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atualizar Dados do Paciente</title>
    <link rel="stylesheet" href="../styles/updateAccount.style.css">
</head>

<body>
    <div id="container">
        <h3>Atualize os dados da sua conta</h3>
        <form method="POST" action="/updatePaciente">
            <div>
                <label>Número do SUS:</label> <!-- FAZER A CONFIRMAÇÃO DO USUÁRIO PELO NÚMERO DO SUS-->
                <input name="cod_sus" placeholder="Digite o Número único SUS (Obrigatório)" type="number" required>
            </div>
            <div>
                <label>Nome:</label>
                <input name="nome" placeholder="Digite o novo nome (opcional)" type="text">
            </div>
            <div>
                <label>Data de nascimento:</label>
                <input name="bornDate" placeholder="Digite a nova data de nascimento (opcional)" type="date">
            </div>

            <div><label>Sexo:</label>
                <select id="sexo" name="sexo">
                    <option value="Masculino">Masculino</option>
                    <option value="Feminino">Feminino</option>
                    <option value="Não Informado">Não Informado</option>
                </select>
            </div>

            <div><label>Tipo Sanguíneo:</label>
                <select id="tipo_sanguineo" name="tipo_sanguineo">
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                </select>
            </div>
            <button type="submit"><span>Atualizar</span></button>
        </form>
    </div>
</body>

</html>
